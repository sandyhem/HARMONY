spring.application.name=HealthCare
#spring.datasource.url=jdbc:mysql://localhost:3306/healthcare_db
#spring.datasource.url=jdbc:postgresql://localhost:5432/healthcare_db
spring.datasource.url=jdbc:postgresql://healthstationdb.cdcg4y6q0akb.eu-north-1.rds.amazonaws.com:5432/healthmanagement
spring.datasource.username=postgres
spring.datasource.password=HealthStation

# Optional but recommended settings
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable Swagger UI and OpenAPI Docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# (Optional) Customize the API Docs path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# (Optional) Sort APIs alphabetically in UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# (Optional) Show request duration in Swagger UI
springdoc.swagger-ui.display-request-duration=true
